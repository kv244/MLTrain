name: Deploy to GCP VM

on:
  push:
    branches: [main]

env:
  TARGET_DIR: ${{ vars.TARGET_DIR || '~/mltrain' }}
  SYSTEMD_SERVICE: ${{ vars.SYSTEMD_SERVICE || 'connect4' }}
  GCS_MODEL_URI: ${{ secrets.GCS_MODEL_URI }} # e.g. gs://your-bucket/model.onnx

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Grant VM service account logging.logWriter
        run: |
          gcloud projects add-iam-policy-binding gen-lang-client-0269772194 \
            --member="serviceAccount:${{ vars.GCP_VM_SA }}" \
            --role="roles/logging.logWriter" \
            --condition=None

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}

      - name: Add VM to known hosts
        # Host keys verified manually from 34.124.251.132 on 2026-04-12.
        # Re-run ssh-keyscan -H 34.124.251.132 and update if the VM is rebuilt.
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/known_hosts << 'KNOWN_HOSTS'
          |1|fo5opbqSoa36zlft2JwCYXZAFaA=|PYm88bj0YIR42GDf1ss/F3sU3c8= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBD1yaSFAUca7yM1Bl2Wet9qxuOdcX986sounqPk0JqjtygpnoPZIgohcSEEAOhrMaT2Ld3yEhd5hJCYxW+Obads=
          |1|9DadvlLwa9uSNaUs2qOpJpInOwY=|6L5o8GzOXSIKKTpN+EGasfMpwww= ssh-rsa 
          |1|fjcz5+S6AYBZO+/UcBV7gCI5NSs=|1LrfGjSrn9cvrI+pBh/rgcNqn7I= ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFk3umLsyjEw3sINMq19OGAkyEnRoW41FG/smdj/8kdO
          KNOWN_HOSTS
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy Application Code
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} << 'EOF'
            set -e
            cd ${{ env.TARGET_DIR }}
            
            # ── Pre-deploy Disk Cleanup ──
            rm -rf ~/.cache/pip || true
            sudo journalctl --vacuum-time=1d || true
            ls -t ~/backups/mltrain_backup_*.tar.gz 2>/dev/null | tail -n +2 | xargs rm -f || true

            # Verify space before backup attempt
            FREE_SPACE=$(df -m / | awk 'NR==2 {print $4}')
            echo "Available space: ${FREE_SPACE}MB"

            if [ "$FREE_SPACE" -lt 500 ]; then
              echo "CRITICAL: Insufficient disk space for deployment."
              exit 1
            fi

            # Backup source code only if space allows
            if [ "$FREE_SPACE" -gt 1500 ]; then
              mkdir -p ~/backups
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              tar -czf ~/backups/mltrain_backup_${TIMESTAMP}.tar.gz . \
                --exclude="./.git" --exclude="./.venv" --exclude="./.venv.backup" \
                --exclude="./__pycache__" --exclude="./*.pt" --exclude="./*.pt.*" \
                --exclude="./*.onnx" --exclude="./*.onnx.data" \
                --exclude="./*.csv" || true
              echo "Backup created."
            else
              echo "Space under 1500MB — skipping backup to preserve headroom."
            fi

            # Backup current venv for rollback only if space allows (venv ~1.7GB)
            FREE_NOW=$(df -m / | awk 'NR==2 {print $4}')
            if [ "$FREE_NOW" -gt 2000 ] && [ -d .venv ]; then
              rm -rf .venv.backup && cp -r .venv .venv.backup || true
              echo "Venv backup created."
            else
              echo "Space under 2000MB — skipping venv backup."
              rm -rf .venv.backup || true
            fi

            git pull origin main

            python3 -m venv .venv --system-site-packages 2>/dev/null || true
            .venv/bin/pip install -r requirements.txt

            sudo systemctl restart ${{ env.SYSTEMD_SERVICE }}
          EOF

      - name: Health check with rollback
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} << 'EOF'
            sleep 5
            if ! systemctl is-active --quiet ${{ env.SYSTEMD_SERVICE }}; then
              echo "Deploy failed — rolling back..."
              journalctl -u ${{ env.SYSTEMD_SERVICE }} -n 30 --no-pager
              [ -d .venv.backup ] && (rm -rf .venv && mv .venv.backup .venv) || true
              sudo systemctl restart ${{ env.SYSTEMD_SERVICE }}
              exit 1
            fi
            echo "Deploy successful."
            rm -rf .venv.backup
          EOF

      - name: Update ONNX Model Weight
        if: env.GCS_MODEL_URI != ''
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} \
            "gsutil cp ${{ env.GCS_MODEL_URI }} ${{ env.TARGET_DIR }}/model.onnx && \
             gsutil cp ${{ env.GCS_MODEL_URI }}.data ${{ env.TARGET_DIR }}/model.onnx.data"
