name: Deploy to GCP VM

on:
  push:
    branches: [main]

env:
  TARGET_DIR: ${{ vars.TARGET_DIR || '~/mltrain' }}
  SYSTEMD_SERVICE: ${{ vars.SYSTEMD_SERVICE || 'connect4' }}
  GCS_MODEL_URI: ${{ secrets.GCS_MODEL_URI }} # e.g. gs://your-bucket/model.onnx

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}

      - name: Add VM to known hosts
        # Host keys verified manually from 34.124.246.40 on 2026-04-05.
        # Re-run ssh-keyscan -H 34.124.246.40 and update if the VM is rebuilt.
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/known_hosts << 'KNOWN_HOSTS'
          |1|+qWp9OuG7vFKASS8We9gdaT/a5g=|JE0pYdbQs9YCS1PiNxN46YaQy50= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBD1yaSFAUca7yM1Bl2Wet9qxuOdcX986sounqPk0JqjtygpnoPZIgohcSEEAOhrMaT2Ld3yEhd5hJCYxW+Obads=
          |1|j/pB4qYqYoauLQ6aD21IudoKVdQ=|5sVXWa/E/bJo7/+eiJ1kBT1Vm4w= ssh-rsa 
          |1|N0+qNuzOGp6EqEFbbW0YGguSKCs=|ievS/CMeMR6DlWKeMD4+3dCyAMQ= ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFk3umLsyjEw3sINMq19OGAkyEnRoW41FG/smdj/8kdO
          KNOWN_HOSTS
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy Application Code
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} << 'EOF'
            set -e
            cd ${{ env.TARGET_DIR }}
            
            # ── NEW: Comprehensive Code Backup ──
            mkdir -p ~/backups
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            tar -czf ~/backups/mltrain_backup_${TIMESTAMP}.tar.gz . \
              --exclude="./.git" --exclude="./.venv" --exclude="./__pycache__" --exclude="./*.pt" \
              --exclude="./*.onnx" --exclude="./*.onnx.data" || true
            
            # Keep only the last 5 backups
            ls -t ~/backups/mltrain_backup_*.tar.gz | tail -n +6 | xargs rm -f 2>/dev/null || true

            # Backup current venv for immediate rollback
            [ -d .venv ] && (rm -rf .venv.backup && cp -r .venv .venv.backup) || true

            git pull origin main

            python3 -m venv .venv --system-site-packages 2>/dev/null || true
            .venv/bin/pip install -r requirements.txt

            sudo systemctl restart ${{ env.SYSTEMD_SERVICE }}
          EOF

      - name: Health check with rollback
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} << 'EOF'
            sleep 5
            if ! systemctl is-active --quiet ${{ env.SYSTEMD_SERVICE }}; then
              echo "Deploy failed — rolling back..."
              journalctl -u ${{ env.SYSTEMD_SERVICE }} -n 30 --no-pager
              [ -d .venv.backup ] && (rm -rf .venv && mv .venv.backup .venv) || true
              sudo systemctl restart ${{ env.SYSTEMD_SERVICE }}
              exit 1
            fi
            echo "Deploy successful."
            rm -rf .venv.backup
          EOF

      - name: Update ONNX Model Weight
        if: env.GCS_MODEL_URI != ''
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} \
            "gsutil cp ${{ env.GCS_MODEL_URI }} ${{ env.TARGET_DIR }}/model.onnx && \
             gsutil cp ${{ env.GCS_MODEL_URI }}.data ${{ env.TARGET_DIR }}/model.onnx.data"
