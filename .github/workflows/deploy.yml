name: Deploy to GCP VM

on:
  push:
    branches: [main]

env:
  TARGET_DIR: ${{ vars.TARGET_DIR || '~/mltrain' }}
  SYSTEMD_SERVICE: ${{ vars.SYSTEMD_SERVICE || 'connect4' }}
  GCS_MODEL_URI: ${{ secrets.GCS_MODEL_URI }} # e.g. gs://your-bucket/model.onnx

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}

      - name: Add VM to known hosts
        run: ssh-keyscan -H ${{ secrets.GCP_VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Application Code
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} << 'EOF'
            set -e
            cd ${{ env.TARGET_DIR }}

            # Backup current venv for rollback
            [ -d .venv ] && (rm -rf .venv.backup && cp -r .venv .venv.backup) || true

            git pull origin main

            python3 -m venv .venv --system-site-packages 2>/dev/null || true
            .venv/bin/pip install -r requirements.txt

            sudo systemctl restart ${{ env.SYSTEMD_SERVICE }}
          EOF

      - name: Health check with rollback
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} << 'EOF'
            sleep 5
            if ! systemctl is-active --quiet ${{ env.SYSTEMD_SERVICE }}; then
              echo "Deploy failed — rolling back..."
              journalctl -u ${{ env.SYSTEMD_SERVICE }} -n 30 --no-pager
              [ -d .venv.backup ] && (rm -rf .venv && mv .venv.backup .venv) || true
              sudo systemctl restart ${{ env.SYSTEMD_SERVICE }}
              exit 1
            fi
            echo "Deploy successful."
            rm -rf .venv.backup
          EOF

      - name: Update ONNX Model Weight
        if: env.GCS_MODEL_URI != ''
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} \
            "gsutil cp ${{ env.GCS_MODEL_URI }} ${{ env.TARGET_DIR }}/model.onnx && \
             gsutil cp ${{ env.GCS_MODEL_URI }}.data ${{ env.TARGET_DIR }}/model.onnx.data"
