<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 AlphaZero</title>
    <!-- Use a modern, premium font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='win-effects.css') }}">
    <!-- OpenVINO runtime is handled on the backend now, no need for heavy frontend models -->
</head>
<body class="cyberpunk-theme">
    <div id="glitchOverlay"></div>
    <div class="background-container" id="bgContainer"></div>
    <div class="app-container">
        
        <!-- Header Section -->
        <header class="game-header">
            <h1>Connect 4 AI</h1>
            <p class="subtitle">Powered by MCTS & AlphaZero</p>
        </header>

        <!-- Sidebar / Top controls -->
        <div class="control-panel">
            <div class="control-group">
                <button id="btnToggleAudio" class="btn-icon">
                    <span class="icon">♪</span> Soundtrack: OFF
                </button>
            </div>
            
            <div class="control-group">
                <label for="modelSelect">Engine Version</label>
                <select id="modelSelect" class="styled-select">
                    <option value="">Loading models...</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="difficultySelect">AI Calculation Depth</label>
                <select id="difficultySelect" class="styled-select">
                    <option value="50">Leisure (Fastest)</option>
                    <option value="400" selected>Standard (Balanced)</option>
                    <option value="800">Tactical (Skilled)</option>
                    <option value="1200">Expert (Slow)</option>
                    <option value="2000">Cyber-God (Resource Intensive)</option>
                </select>
            </div>

            <!-- Start Game Controls -->
             <div class="action-buttons">
                <button id="btnPlayerFirst" class="btn primary-btn">You Play First (X)</button>
                <button id="btnAiFirst" class="btn secondary-btn">AI Plays First (O)</button>
             </div>
             
             <!-- Stats Panel -->
             <div class="stats-panel">
                <h3 class="stats-title">Session Stats</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Hardware:</span>
                        <span id="hardwareBadge" class="stat-value highlight">...</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total Games:</span>
                        <span id="statGames" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label" style="color: var(--player-1);">Your Wins:</span>
                        <span id="statPlayerWins" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label" style="color: var(--player-2);">AI Wins:</span>
                        <span id="statAiWins" class="stat-value">0</span>
                    </div>
                </div>
             </div>
        </div>

        <!-- Main Game Area -->
        <main class="board-container hidden" id="boardArea">
            <div class="status-bar" id="statusBar">
                <h2>Choose a column to play!</h2>
                <div id="assessmentContainer" class="assessment-container"></div>
                <div class="player-turn-badge" id="turnBadge">Your Turn</div>
            </div>

            <!-- The Connect 4 Grid -->
            <div class="connect4-board" id="c4Board">
                <!-- Columns and spots will be injected by JavaScript -->
            </div>
            
            <button id="btnReset" class="btn secondary-btn btn-small mt-loose hidden">Restart Game</button>
        </main>

    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='audio-engine.js') }}"></script>
    <script src="{{ url_for('static', filename='win-effects.js') }}"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
